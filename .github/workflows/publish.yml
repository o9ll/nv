name: Release Extension

on:
  workflow_dispatch:

env:
  FORCE_COLOR: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get package.json version
        id: pkg
        run: echo "version=v$(jq -r .version < package.json)" >> "$GITHUB_OUTPUT"

      - name: Get latest Git tag
        id: tag
        run: |
          latest_tag=$(git tag --list 'v*' --sort=-v:refname | head -n 1 || echo "v0.0.0")
          echo "latest=$latest_tag" >> "$GITHUB_OUTPUT"

      - name: Check if package.json version is newer
        id: check
        run: |
          pkg="${{ steps.pkg.outputs.version }}"
          latest="${{ steps.tag.outputs.latest }}"

          if [ "$pkg" != "$latest" ] && [ "$(sort -V <<<"$latest"$'\n'"$pkg" | tail -n1)" = "$pkg" ]; then
            echo "release=true" >> "$GITHUB_OUTPUT"
          else
            echo "release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop if not newer
        if: steps.check.outputs.release == 'false'
        run: exit 0

      - name: Create Tag
        if: steps.check.outputs.release == 'true'
        uses: butlerlogic/action-autotag@1.1.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_prefix: "v"

      - name: Setup PNPM
        if: steps.check.outputs.release == 'true'
        uses: pnpm/action-setup@v3

      - name: Use Node.js 20
        if: steps.check.outputs.release == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        if: steps.check.outputs.release == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build Chrome extension
        if: steps.check.outputs.release == 'true'
        run: pnpm buildWebStandalone

      - name: Rename release asset
        if: steps.check.outputs.release == 'true'
        run: cp dist/extension-chrome.zip dist/nv.zip

      - name: Verify build artifact
        if: steps.check.outputs.release == 'true'
        run: test -f dist/nv.zip

      - name: Publish Release (Chrome only)
        if: steps.check.outputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/nv.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
